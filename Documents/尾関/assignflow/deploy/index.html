        <h2 style={{fontSize:16,fontWeight:800,color:"#1E293B",marginBottom:22,textAlign:"center"}}>ログイン</h2>

        {/* ログインID */}
        <div style={{marginBottom:14}}>
          <label style={{fontSize:11,color:"#64748B",fontWeight:700,display:"block",marginBottom:6}}>ログインID</label>
          <input type="text" value={loginId} onChange={e=>{setLoginId(e.target.value);setError("");}}
            onKeyDown={handleKeyDown} placeholder="例: tanaka" autoComplete="username" style={IS2}/>
        </div>

        {/* パスワード */}
        <div style={{marginBottom:20}}>
          <label style={{fontSize:11,color:"#64748B",fontWeight:700,display:"block",marginBottom:6}}>パスワード</label>
          <input type="password" value={password} onChange={e=>{setPassword(e.target.value);setError("");}}
            onKeyDown={handleKeyDown} placeholder="パスワードを入力" autoComplete="current-password" style={IS2}/>
        </div>

        {/* エラー */}
        {error && (
          <div style={{marginBottom:14,padding:"8px 12px",borderRadius:10,background:"rgba(255,107,107,0.12)",border:"1px solid rgba(255,107,107,0.3)",color:"#FF8888",fontSize:12,textAlign:"center"}}>
            {error}
          </div>
        )}

        {/* ログインボタン */}
        <button onClick={handleLogin}
          onMouseEnter={e=>e.currentTarget.style.opacity="0.85"}
          onMouseLeave={e=>e.currentTarget.style.opacity="1"}
          style={{width:"100%",padding:13,borderRadius:10,border:"none",background:"#0077FF",color:"#FFFFFF",cursor:"pointer",fontSize:14,fontWeight:800,letterSpacing:"0.3px",transition:"opacity .15s"}}>
          ログイン
        </button>
      </div>

      {/* サンプルアカウント */}
      <div style={{marginTop:16,width:"100%",maxWidth:380}}>
        <button onClick={()=>setShowHints(p=>!p)}
          style={{width:"100%",padding:"8px 14px",borderRadius:10,border:"1px solid #FFE0C8",background:"transparent",color:"#94A3B8",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span>サンプルアカウントを表示</span>
          <span style={{transition:"transform .2s",display:"inline-block",transform:showHints?"rotate(180deg)":"rotate(0deg)"}}>▼</span>
        </button>
        {showHints && (
          <div style={{marginTop:8,background:"#FFFFFF",border:"1px solid #FFE0C8",borderRadius:12,overflow:"hidden"}}>
            {SAMPLE_ACCOUNTS.map((acc,i)=>(
              <div key={acc.loginId} onClick={()=>fillSample(acc)}
                style={{padding:"10px 14px",cursor:"pointer",borderBottom:i<SAMPLE_ACCOUNTS.length-1?"1px solid #FFE8D8":"none"}}
                onMouseEnter={e=>e.currentTarget.style.background="#FFF0E8"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <div style={{fontSize:12,color:"#0077FF",fontWeight:700,marginBottom:2}}>{acc.loginId}</div>
                <div style={{fontSize:11,color:"#94A3B8"}}>{acc.label}</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── 星評価 ────────────────────────────────────────────────
function StarRating({ value, onChange }) {
  const [hover, setHover] = React.useState(0);
  return (
    <div style={{display:"flex",alignItems:"center",gap:2}}>
      {[1,2,3,4,5].map(n => (
        <button key={n}
          onMouseEnter={() => setHover(n)}
          onMouseLeave={() => setHover(0)}
          onClick={() => onChange(n)}
          style={{
            fontSize:24,background:"none",border:"none",cursor:"pointer",padding:"2px 1px",
            color:(hover||value)>=n ? "#FFD700" : "#FFE0C8",
            transition:"color .1s, transform .1s",
            transform:(hover||value)>=n ? "scale(1.1)" : "scale(1)",
          }}>★</button>
      ))}
      {value > 0 && <span style={{fontSize:11,color:"#64748B",marginLeft:5,lineHeight:"28px"}}>{value}/5</span>}
    </div>
  );
}

// ─── 案件評価モーダル ──────────────────────────────────────
function EvaluationModal({ assignment, member, evaluations, currentUser, onSave, onClose }) {
  const existing = evaluations.find(e => e.memberId===member.id && e.projectName===assignment.projectName && e.evaluatorId===currentUser?.id);
  const [ratings, setRatings] = React.useState(
    existing ? {...existing.ratings} : { quality:0, deadline:0, communication:0, initiative:0 }
  );
  const [comment, setComment] = React.useState(existing ? existing.comment : "");

  const isComplete = EVAL_AXES.every(ax => ratings[ax.key] > 0);

  function handleSave() {
    if (!isComplete) return;
    onSave({
      id: Date.now(),
      memberId: member.id,
      projectName: assignment.projectName,
      month: assignment.month,
      evaluatorId: currentUser.id,
      evaluatorName: currentUser.name,
      ratings: { ...ratings },
      comment,
      createdAt: new Date().toISOString(),
    });
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",
      alignItems:"center",justifyContent:"center",zIndex:2000,padding:20}}>
      <div style={{background:"#FFFFFF",border:"1px solid #FFE0C8",borderRadius:16,
        width:"100%",maxWidth:480,boxShadow:"0 12px 40px rgba(0,0,0,0.6)"}}>

        {/* ヘッダー */}
        <div style={{padding:"18px 22px 14px",borderBottom:"1px solid #FFE0C8",
          display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:40,height:40,borderRadius:10,background:member.color||"#0077FF",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:12,fontWeight:800,color:"#FFFFFF",flexShrink:0}}>
            {member.avatar}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:800,color:"#1E293B"}}>{member.name}</div>
            <div style={{fontSize:11,color:"#94A3B8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
              {assignment.projectName}
            </div>
          </div>
          {existing && (
            <span style={{fontSize:9,padding:"2px 7px",borderRadius:10,
              background:"rgba(0,119,255,0.12)",color:"#0077FF",
              border:"1px solid rgba(0,119,255,0.3)",fontWeight:700,flexShrink:0}}>再評価</span>
          )}
          <button onClick={onClose}
            style={{background:"none",border:"none",color:"#94A3B8",fontSize:18,cursor:"pointer",
              padding:"0 4px",lineHeight:1,flexShrink:0}}>×</button>
        </div>

        {/* 評価軸 */}
        <div style={{padding:"16px 22px",display:"flex",flexDirection:"column",gap:16}}>
          {EVAL_AXES.map(ax => (
            <div key={ax.key}>
              <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:6}}>
                <span style={{fontSize:13,fontWeight:700,color:"#1E293B"}}>{ax.label}</span>
                <span style={{fontSize:10,color:"#94A3B8"}}>{ax.desc}</span>
              </div>
              <StarRating value={ratings[ax.key]} onChange={v => setRatings(p=>({...p,[ax.key]:v}))} />
            </div>
          ))}

          {/* コメント */}
          <div>
            <div style={{fontSize:12,fontWeight:700,color:"#1E293B",marginBottom:6}}>コメント <span style={{fontSize:10,color:"#94A3B8",fontWeight:400}}>(任意)</span></div>
            <textarea
              value={comment}
              onChange={e => setComment(e.target.value)}
              placeholder="フリーコメントを入力..."
              rows={3}
              style={{width:"100%",padding:"10px 12px",borderRadius:10,
                border:"1px solid #FFE0C8",background:"#FCF5EF",color:"#1E293B",
                fontSize:12,outline:"none",resize:"vertical",boxSizing:"border-box",
                fontFamily:"inherit"}}
            />
          </div>
        </div>

        {/* フッター */}
        <div style={{padding:"12px 22px 18px",display:"flex",justifyContent:"flex-end",gap:8}}>
          <button onClick={onClose}
            style={{padding:"8px 16px",borderRadius:10,border:"1px solid #FFE0C8",
              background:"none",color:"#94A3B8",fontSize:12,cursor:"pointer"}}>キャンセル</button>
          <button onClick={handleSave} disabled={!isComplete}
            style={{padding:"8px 20px",borderRadius:10,border:"none",
              background: isComplete ? "#0077FF" : "#FFE0C8",
              color: isComplete ? "#0A0A0F" : "#555",
              fontSize:12,fontWeight:800,cursor: isComplete ? "pointer" : "default",
              transition:"background .15s"}}>評価を保存</button>
        </div>
      </div>
    </div>
  );
}

function ImportModal({ members, onImport, onClose }) {
  const IS2 = { width:"100%", padding:"10px 13px", borderRadius:10, border:"1px solid #FFE0C8", background:"#FFF8F4", color:"#1E293B", fontSize:13, outline:"none", boxSizing:"border-box" };
  const [step, setStep]       = useState("input");   // input | map | preview
  const [csvText, setCsvText] = useState("");
  const [headers, setHeaders] = useState([]);
  const [rows, setRows]       = useState([]);         // raw rows (array of arrays)
  const [map, setMap]         = useState({ name:"", project:"", hours:"", month:"", status:"" });
  const [monthFixed, setMonthFixed] = useState("");   // 月を固定入力する場合
  const [preview, setPreview] = useState([]);
  const [errors,  setErrors]  = useState([]);

  // ── サンプルCSV ──────────────────────────────────────────
  const SAMPLE = `担当者,案件名,月,時間数,ステータス
田中 葵,LOGOSリブランディング,2025-03,40,ongoing
森 健二,ECOSサイトリニューアル,2025-03,60,approved
伊藤 桜,新商品キャンペーン,2025-04,30,pending`;

  // ── Step1: CSVパース → ヘッダー抽出 ──────────────────────
  function handleParse() {
    const lines = csvText.trim().split(/\r?\n/).filter(l=>l.trim());
    if (lines.length < 2) { setErrors(["データが2行以上必要です"]); return; }
    const hdrs = lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,""));
    const rs   = lines.slice(1).map(l=>l.split(",").map(c=>c.trim().replace(/^"|"$/g,"")));
    setHeaders(hdrs);
    setRows(rs);
    setErrors([]);
    // 自動マッピング（列名ヒューリスティック）
    const auto = { name:"", project:"", hours:"", month:"", status:"" };
    hdrs.forEach((h,i) => {
      const lh = h.toLowerCase();
      if (!auto.name    && (h.includes("氏名")||h.includes("担当")||lh==="name")) auto.name = String(i);
      if (!auto.project && (h.includes("案件")||h.includes("品名")||h.includes("工事")||lh.includes("project")||lh.includes("item"))) auto.project = String(i);
      if (!auto.hours   && (h.includes("時間")||h.includes("数量")||h.includes("工数")||lh.includes("hour")||lh.includes("qty")||lh.includes("h"))) auto.hours = String(i);
      if (!auto.month   && (h.includes("月")||lh.includes("month")||/^\d{4}-\d{2}$/.test(h))) auto.month = String(i);
      if (!auto.status  && (h.includes("ステータス")||lh.includes("status"))) auto.status = String(i);
    });
    setMap(auto);
    setStep("map");
  }

  // ── Step2: マッピング確定 → プレビュー生成 ───────────────
  function handleBuild() {
    const errs = [], result = []; let id = Date.now();
    rows.forEach((cols, li) => {
      const name   = map.name    !== "" ? cols[+map.name]    : "";
      const proj   = map.project !== "" ? cols[+map.project] : "";
      const hRaw   = map.hours   !== "" ? cols[+map.hours]   : "";
      const month  = map.month   !== "" ? cols[+map.month]   : monthFixed;
      const status = map.status  !== "" ? (cols[+map.status]||"pending") : "pending";
      const statusNorm = {ongoing:"ongoing",decided:"decided",approved:"approved",pending:"pending",completed:"completed",継続:"ongoing",決定:"decided",承諾:"approved",打診:"pending",完了:"completed"}[status] || "pending";
      if (!name || !proj) { errs.push(`行${li+2}: 氏名または案件名が空`); return; }
      const member = members.find(m=>m.name===name||m.name.replace(/\s/g,"")===name.replace(/\s/g,""));
      if (!member) { errs.push(`行${li+2}: 「${name}」がメンバーに見つかりません`); return; }
      const h = parseFloat(hRaw);
      if (isNaN(h)||h<=0) { errs.push(`行${li+2}: 時間数が不正 (${hRaw})`); return; }
      if (!month||!/^\d{4}-\d{2}$/.test(month)) { errs.push(`行${li+2}: 月の形式が不正 (${month}) — YYYY-MM形式で`); return; }
      result.push({ id:id++, memberId:member.id, projectName:proj, hours:h, month, status:statusNorm, inputBy:"下見積インポート" });
    });
    setErrors(errs);
    setPreview(result);
    setStep("preview");
  }

  const SEL = {
    padding:"8px 10px", borderRadius:10, border:"1px solid #FFE0C8",
    background:"#FCF5EF", color:"#1E293B", fontSize:12, width:"100%", cursor:"pointer"
  };
  const colOptions = [<option key="" value="">— 列を選択 —</option>, ...headers.map((h,i)=><option key={i} value={String(i)}>{h}</option>)];

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onClick={onClose}>
      <div style={{background:"#FFFFFF",borderRadius:24,padding:28,width:560,border:"1px solid #FFE0C8",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>

        {/* ヘッダー */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
          <div>
            <h2 style={{margin:0,fontSize:17,fontWeight:800}}>下見積CSVインポート</h2>
            <p style={{margin:"4px 0 0",fontSize:11,color:"#64748B"}}>
              {step==="input"?"CSVを貼り付けて列をマッピングします":step==="map"?"各列の対応を確認・調整してください":"取り込み内容を確認してください"}
            </p>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#94A3B8",cursor:"pointer",fontSize:22,lineHeight:1}}>×</button>
        </div>

        {/* ステップインジケーター */}
        <div style={{display:"flex",gap:4,marginBottom:20}}>
          {[["input","① 貼り付け"],["map","② 列の対応"],["preview","③ 確認"]].map(([s,label])=>(
            <div key={s} style={{flex:1,padding:"5px 0",textAlign:"center",fontSize:10,fontWeight:700,borderRadius:6,
              background:step===s?"rgba(0,119,255,0.2)":"#F0F4FF",
              color:step===s?"#0077FF":"#444",border:`1px solid ${step===s?"rgba(0,119,255,0.4)":"#FFE0C8"}`}}>
              {label}
            </div>
          ))}
        </div>

        {/* ── Step 1: ファイル選択 or 貼り付け ── */}
        {step==="input"&&(
          <div>
            <label style={{display:"block",marginBottom:12,cursor:"pointer"}}>
              <div style={{border:"2px dashed #FFE0C8",borderRadius:12,padding:"22px 0",textAlign:"center",background:"#FCF5EF"}}
                onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="#0077FF";}}
                onDragLeave={e=>{e.currentTarget.style.borderColor="#FFE0C8";}}
                onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor="#FFE0C8";
                  const f=e.dataTransfer.files[0];
                  if(f){const r=new FileReader();r.onload=ev=>setCsvText(ev.target.result);r.readAsText(f,"UTF-8");}
                }}>
                <div style={{fontSize:28,marginBottom:6}}>📂</div>
                <div style={{fontSize:13,fontWeight:700,color:"#0077FF"}}>CSVファイルを選択</div>
                <div style={{fontSize:11,color:"#94A3B8",marginTop:3}}>クリックして選択、またはドラッグ＆ドロップ</div>
              </div>
              <input type="file" accept=".csv,.txt" style={{display:"none"}}
                onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>setCsvText(ev.target.result);r.readAsText(f,"UTF-8");}}}/>
            </label>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{flex:1,height:1,background:"#FFE0C8"}}/>
              <span style={{fontSize:11,color:"#444"}}>または直接貼り付け</span>
              <div style={{flex:1,height:1,background:"#FFE0C8"}}/>
            </div>
            <textarea value={csvText} onChange={e=>setCsvText(e.target.value)}
              placeholder={SAMPLE}
              style={{...IS2,height:100,resize:"vertical",fontFamily:"monospace",fontSize:11,lineHeight:1.6}}/>
            {csvText&&<div style={{fontSize:11,color:"#4ECDC4",marginTop:4,display:"flex",alignItems:"center",gap:4}}><Icon name="check" size={11} color="currentColor"/>{csvText.trim().split(/\r?\n/).length}行 読み込み済み</div>}
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button onClick={()=>setCsvText(SAMPLE)} style={{padding:"8px 14px",borderRadius:10,border:"1px solid #FFE0C8",background:"transparent",color:"#94A3B8",cursor:"pointer",fontSize:11}}>サンプルを挿入</button>
              <button onClick={handleParse} disabled={!csvText.trim()}
                style={{flex:1,padding:10,borderRadius:10,border:"none",background:csvText.trim()?"#0077FF":"#FFD9C0",color:csvText.trim()?"#FFFFFF":"#94A3B8",cursor:csvText.trim()?"pointer":"default",fontWeight:700,fontSize:13}}>
                列を確認する →
              </button>
            </div>
            {errors.length>0&&<div style={{marginTop:10}}>{errors.map((e,i)=><div key={i} style={{fontSize:11,color:"#FF8888"}}><Icon name="warning" size={11} color="currentColor" style={{marginRight:3}}/>{e}</div>)}</div>}
          </div>
        )}


        {/* ── Step 2: 列マッピング ── */}
        {step==="map"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              {[
                {key:"name",    label:"担当者名 *", required:true},
                {key:"project", label:"案件名 *",   required:true},
                {key:"hours",   label:"時間数 *",   required:true},
                {key:"status",  label:"ステータス", required:false},
              ].map(({key,label,required})=>(
                <div key={key}>
                  <label style={{fontSize:11,color:required?"#0077FF":"#666",fontWeight:700,display:"block",marginBottom:4}}>
                    {label}
                  </label>
                  <select value={map[key]} onChange={e=>setMap(p=>({...p,[key]:e.target.value}))} style={SEL}>
                    {colOptions}
                  </select>
                </div>
              ))}
            </div>
            {/* 月の設定 */}
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,color:"#0077FF",fontWeight:700,display:"block",marginBottom:4}}>月 *</label>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <select value={map.month} onChange={e=>setMap(p=>({...p,month:e.target.value}))} style={{...SEL,flex:1}}>
                  {colOptions}
                </select>
                <span style={{fontSize:11,color:"#94A3B8",flexShrink:0}}>または固定で</span>
                <input value={monthFixed} onChange={e=>setMonthFixed(e.target.value)} placeholder="2025-03"
                  style={{...IS2,width:100,padding:"8px 10px",fontSize:12}}/>
              </div>
              <div style={{fontSize:10,color:"#94A3B8",marginTop:4}}>CSVに月列がない場合は右側に直接入力</div>
            </div>
            {/* プレビュー（先頭3行） */}
            <div style={{background:"#FCF5EF",borderRadius:10,padding:"8px 10px",marginBottom:14,fontSize:10,color:"#94A3B8"}}>
              <div style={{fontWeight:700,marginBottom:6,color:"#64748B"}}>データプレビュー（先頭3行）</div>
              {rows.slice(0,3).map((r,i)=>(
                <div key={i} style={{fontFamily:"monospace",marginBottom:2,color:"#777"}}>{r.join(" | ")}</div>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setStep("input")} style={{padding:"10px 16px",borderRadius:10,border:"1px solid #FFE0C8",background:"transparent",color:"#777",cursor:"pointer",fontSize:12}}>← 戻る</button>
              <button onClick={handleBuild}
                style={{flex:1,padding:10,borderRadius:10,border:"none",background:"#0077FF",color:"#FFFFFF",cursor:"pointer",fontWeight:700,fontSize:13}}>
                取り込み内容を確認 →
              </button>
            </div>
          </div>
        )}

        {/* ── Step 3: プレビュー ── */}
        {step==="preview"&&(
          <div>
            {errors.length>0&&(
              <div style={{marginBottom:12,background:"rgba(255,107,107,0.08)",borderRadius:10,padding:"10px 12px"}}>
                {errors.map((e,i)=><div key={i} style={{fontSize:11,color:"#FF8888",marginBottom:2}}><Icon name="warning" size={11} color="currentColor" style={{marginRight:3}}/>{e}</div>)}
              </div>
            )}
            {preview.length>0?(
              <>
                <div style={{fontSize:12,color:"#4ECDC4",fontWeight:700,marginBottom:10,display:"flex",alignItems:"center",gap:4}}><Icon name="check" size={11} color="currentColor"/>{preview.length}件を取り込み予定</div>
                <div style={{background:"#FCF5EF",borderRadius:10,maxHeight:240,overflowY:"auto",marginBottom:14}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead><tr style={{background:"#FFE0C8",position:"sticky",top:0}}>
                      {["担当者","案件名","月","h","ステータス"].map(h=><th key={h} style={{padding:"6px 9px",textAlign:"left",color:"#64748B",fontWeight:700}}>{h}</th>)}
                    </tr></thead>
                    <tbody>{preview.map((r,i)=>{
                      const m=members.find(x=>x.id===r.memberId);
                      const st=getStatus(r.status);
                      return(
                        <tr key={i} style={{borderTop:"1px solid #FFD9C0"}}>
                          <td style={{padding:"5px 9px",color:"#CCC"}}>{m?.name}</td>
                          <td style={{padding:"5px 9px",color:"#CCC",maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.projectName}</td>
                          <td style={{padding:"5px 9px",color:"#94A3B8"}}>{r.month}</td>
                          <td style={{padding:"5px 9px",color:"#0077FF",fontWeight:700}}>{r.hours}</td>
                          <td style={{padding:"5px 9px"}}><span style={{fontSize:9,padding:"1px 6px",borderRadius:10,background:st?.bg,color:st?.color,fontWeight:700}}>{st?.label}</span></td>
                        </tr>
                      );
                    })}</tbody>
                  </table>
                </div>
              </>
            ):(
              <div style={{textAlign:"center",padding:"24px 0",color:"#94A3B8"}}>取り込めるデータがありません</div>
            )}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setStep("map")} style={{padding:"10px 16px",borderRadius:10,border:"1px solid #FFE0C8",background:"transparent",color:"#777",cursor:"pointer",fontSize:12}}>← 戻る</button>
              {preview.length>0&&(
                <button onClick={()=>onImport(preview)}
                  style={{flex:1,padding:11,borderRadius:10,border:"none",background:"#0077FF",color:"#FFFFFF",cursor:"pointer",fontSize:13,fontWeight:700}}>
                  {preview.length}件を取り込む
                </button>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


function calcMemberAvgRatings(memberId, evals) {
  const me = evals.filter(e => e.memberId === memberId);
  if (!me.length) return null;
  const sums = {quality:0,deadline:0,communication:0,initiative:0};
  me.forEach(e => EVAL_AXES.forEach(ax => { sums[ax.key] += e.ratings[ax.key]; }));
  const avg = {};
  EVAL_AXES.forEach(ax => { avg[ax.key] = +(sums[ax.key]/me.length).toFixed(1); });
  avg.total = +(EVAL_AXES.reduce((s,ax)=>s+avg[ax.key],0)/EVAL_AXES.length).toFixed(1);
  avg.count = me.length;
  return avg;
}

function DashboardPanel({ member:m, members, assignments, selectedMonth, onClose, onEdit, onAddAssign, isAdmin, currentUser, evaluations }) {
  const ma = assignments.filter(a=>a.memberId===m.id&&a.month===selectedMonth);
  const h = ma.filter(a=>CONFIRMED_STATUSES.includes(a.status)).reduce((s,a)=>s+a.hours,0);
  const pct = Math.min(100,Math.round((h/m.maxHours)*100));
  const bc = pct>=100?"#FF6B6B":pct>70?"#FEA735":"#4ECDC4";
  return (
    <div style={{position:"fixed",top:0,right:0,bottom:0,width:380,background:"#FFFFFF",borderLeft:"1px solid #FFE0C8",zIndex:200,boxShadow:"-8px 0 32px rgba(0,0,0,0.5)",overflowY:"auto",animation:"slideIn 0.2s ease"}}>
      <style>{`@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}`}</style>
      <div style={{padding:"14px 18px",borderBottom:"1px solid #FFE0C8",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:"#FFFFFF"}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <Avatar member={m} size={36}/>
          <div><div style={{fontSize:14,fontWeight:800}}>{m.name}</div><div style={{fontSize:11, color: "#94A3B8"}}>{m.role}</div></div>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none", color: "#94A3B8",cursor:"pointer",fontSize:20}}>×</button>
      </div>
      <div style={{padding:"14px 18px",display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:"rgba(0,119,255,0.12)", color: "#0077FF",border:"1px solid rgba(0,119,255,0.25)",fontWeight:700}}>{m.rank}</span>
          <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:"rgba(78,205,196,0.1)", color: "#4ECDC4",border:"1px solid rgba(78,205,196,0.2)"}}>{m.contractType}</span>
          {m.canPropose&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:"rgba(0,119,255,0.1)", color: "#0077FF",border:"1px solid rgba(0,119,255,0.2)"}}>提案OK</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:10,color:"#94A3B8",fontWeight:700}}>時給</span>
            <span style={{fontSize:13,fontWeight:800,color:"#1E293B"}}>¥{(m.hourlyRate||0).toLocaleString()}<span style={{fontSize:10,color:"#94A3B8",fontWeight:400}}>/h</span></span>
          </div>
          {m.notionUrl&&(
            <a href={m.notionUrl} target="_blank" rel="noopener noreferrer"
              style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,color:"#64748B",textDecoration:"none",
                padding:"4px 10px",borderRadius:8,border:"1px solid #E2E8F0",background:"#F8FAFC",fontWeight:600,
                transition:"border-color 0.15s,color 0.15s"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="#0077FF";e.currentTarget.style.color="#0077FF";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="#E2E8F0";e.currentTarget.style.color="#64748B";}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              Notion プロフィール
            </a>
          )}
        </div>
        <div style={{background:"#FCF5EF",borderRadius:10,padding:"11px 13px"}}>
          <div style={{fontSize:10, color: "#94A3B8",fontWeight:700,marginBottom:5}}>今月の稼働</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
            <span style={{fontSize:22,fontWeight:900, color:bc}}>{pct}<span style={{fontSize:11}}>%</span></span>
            <span style={{fontSize:11, color: "#94A3B8"}}>{h}/{m.maxHours}h</span>
          </div>
          <div style={{background:"#FFD9C0",borderRadius:3,height:6,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:bc,borderRadius:3}}/>
          </div>
        </div>
        {ma.length>0&&(
          <div>
            <div style={{fontSize:10, color: "#94A3B8",fontWeight:700,marginBottom:5}}>今月の案件</div>
            {ma.map(a=>{const st=getStatus(a.status);return(
              <div key={a.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 9px",background:"#FCF5EF",borderRadius:10,marginBottom:3}}>
                <span style={{fontSize:9,padding:"1px 5px",borderRadius:10,background:st?.bg, color:st?.color,fontWeight:700,flexShrink:0}}>{st?.label}</span>
                <span style={{fontSize:11, color: "#64748B",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.projectName}</span>
                <span style={{fontSize:10,fontWeight:700, color: "#64748B"}}>{a.hours}h</span>
              </div>
            );})}
          </div>
        )}
        {(m.skills||[]).length>0&&(
          <div>
            <div style={{fontSize:10, color: "#94A3B8",fontWeight:700,marginBottom:5}}>スキル</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{m.skills.map(s=><span key={s} style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:"rgba(0,119,255,0.1)", color: "#0077FF",border:"1px solid rgba(0,119,255,0.2)"}}>{s}</span>)}</div>
          </div>
        )}
        {(()=>{
          const avg = calcMemberAvgRatings(m.id, evaluations||[]);
          if (!avg) return null;
          return (
            <div style={{background:"#FCF5EF",borderRadius:10,padding:"11px 13px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:10, color:"#94A3B8",fontWeight:700}}>評価平均</div>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <span style={{fontSize:18,fontWeight:900,color:"#FEA735"}}>★ {avg.total}</span>
                  <span style={{fontSize:10,color:"#94A3B8"}}>({avg.count}件)</span>
                </div>
              </div>
              {EVAL_AXES.map(ax=>(
                <div key={ax.key} style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
                  <div style={{fontSize:10,color:"#64748B",width:70,flexShrink:0}}>{ax.label}</div>
                  <div style={{flex:1,height:5,background:"#FFD9C0",borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${(avg[ax.key]/5)*100}%`,background:"#FEA735",borderRadius:3}}/>
                  </div>
                  <div style={{fontSize:10,fontWeight:700,color:"#FEA735",width:24,textAlign:"right"}}>{avg[ax.key]}</div>
                </div>
              ))}
            </div>
          );
        })()}
        <div style={{display:"flex",flexDirection:"column",gap:5,paddingTop:4}}>
          <button onClick={()=>{onAddAssign(m);onClose();}} style={{padding:"8px",borderRadius:10,border:"1px solid #0077FF",background:"rgba(0,119,255,0.08)", color: "#0077FF",cursor:"pointer",fontSize:12,fontWeight:700}}>+ 工数を追加</button>
          {(isAdmin || currentUser?.id === m.id) && (
            <button onClick={()=>{onEdit(m);onClose();}} style={{padding:"7px",borderRadius:10,border:"1px solid #FFE0C8",background:"transparent", color: "#777",cursor:"pointer",fontSize:11}}>プロフィール編集</button>
          )}
        </div>
      </div>
    </div>
  );
}

root.render(React.createElement(App));
