};

// メンバーの案件タイプを返す。override があればそちら優先、なければスキルから自動生成
function getProjectFit(member) {
  if (member.projectFitOverride && member.projectFitOverride.length > 0) {
    return member.projectFitOverride;
  }
  const types = [];
  (member.skills || []).forEach(skill => {
    const mapped = SKILL_TO_PROJECT_TYPES[skill] || [];
    mapped.forEach(t => { if (!types.includes(t)) types.push(t); });
  });
  return types.slice(0, 4); // 最大4件表示
}

function formatMonth(m) {
  const [y,mo] = m.split("-"); return `${y}年${parseInt(mo)}月`;
}
function getStatus(key) { return ASSIGNMENT_STATUSES.find(s=>s.key===key) || ASSIGNMENT_STATUSES[0]; }

// ─── コンポーネント ───────────────────────────────────────
function PersonIcon({ size=20 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="rgba(255,255,255,0.85)" style={{display:"block"}}>
      <circle cx="12" cy="8" r="4"/>
      <path d="M20 21a8 8 0 1 0-16 0"/>
    </svg>
  );
}

function Avatar({ member, size=40, fontSize=12 }) {
  if (member.imageUrl) {
    return <img src={member.imageUrl} style={{width:size,height:size,borderRadius:size*0.28,objectFit:"cover",flexShrink:0,display:"block"}} onError={e=>{e.currentTarget.style.display="none"}}/>;
  }
  return (
    <div style={{width:size,height:size,borderRadius:size*0.28,background:member.color,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
      <PersonIcon size={size*0.55}/>
    </div>
  );
}

function StatusBadge({ statusKey, small=false }) {
  const s = getStatus(statusKey);
  return (
    <span style={{fontSize:small?10:12,padding:small?"2px 8px":"4px 11px",borderRadius:20,background:s.bg, color:s.color,fontWeight:700,border:`1px solid ${s.color}44`,whiteSpace:"nowrap"}}>
      {s.label}
    </span>
  );
}

function Tag({ label, color, bg }) {
  return <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:bg||"rgba(0,119,255,0.12)", color:color||"#0077FF",fontWeight:700,border:`1px solid ${color||"#0077FF"}33`}}>{label}</span>;
}

function MemberBadges({ member, compact=false }) {
  return (
    <div style={{display:"flex",flexWrap:"wrap",gap:4,alignItems:"center"}}>
      <Tag label={member.rank} color={RANK_COLORS[member.rank]} />
      <Tag label={member.contractType} color={CONTRACT_COLORS[member.contractType]} />
      {member.canPropose && <Tag label="提案稼働OK" color="#0077FF" />}
      {!compact && <Tag label={`¥${member.hourlyRate.toLocaleString()}/h`} color="#888" bg="rgba(120,120,140,0.1)" />}
    </div>
  );
}

function Modal({ onClose, title, children, width=420 }) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={onClose}>
      <div style={{background:"#FFFFFF",borderRadius:24,padding:32,width,border:"1px solid #FFE0C8",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
          <h2 style={{margin:0,fontSize:20,fontWeight:800}}>{title}</h2>
          <button onClick={onClose} style={{background:"transparent",border:"none", color: "#94A3B8",cursor:"pointer",fontSize:20,lineHeight:1}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({ label, required, children }) {
  return (
    <div style={{marginBottom:14}}>
      <label style={{fontSize:11, color: "#64748B",fontWeight:700,display:"block",marginBottom:6,letterSpacing:"0.5px"}}>
        {label}{required && <span style={{color:"#0077FF",marginLeft:3}}>*</span>}
      </label>
      {children}
    </div>
  );
}

function App() {
  const [members, setMembers]         = useState(INITIAL_MEMBERS);
  const [assignments, setAssignments] = useState(INITIAL_ASSIGNMENTS);
  const [activeTab, setActiveTab]     = useState("dashboard");
  const [selectedMonth, setSelectedMonth] = useState("2025-03");

  // 認証・評価
  const [currentUser, setCurrentUser]     = useState(null);
  const [evaluations, setEvaluations]     = useState(() => {
    try {
      const stored = localStorage.getItem("af_evaluations");
      return stored ? JSON.parse(stored) : INITIAL_EVALUATIONS;
    }
    catch { return INITIAL_EVALUATIONS; }
  });
  const [showEvalModal, setShowEvalModal] = useState(null); // { assignment, member }

  // モーダル
  const [showAssignModal, setShowAssignModal]   = useState(false);
  const [showImportModal, setShowImportModal]   = useState(false);
  const [dashboardPanel, setDashboardPanel]     = useState(null);
  const [showMemberModal, setShowMemberModal]   = useState(false);
  const [showEditModal, setShowEditModal]       = useState(null);
  const [showStatusModal, setShowStatusModal]   = useState(null);
  const [editAssignModal, setEditAssignModal]   = useState(null);
  const [lockedMemberId, setLockedMemberId]     = useState(null);

  // フォーム
  const [form, setForm] = useState({
    memberId:"", projectName:"", clientName:"", hours:"", month:"2025-03",
    inputBy:"管理者", status:"pending"
  });
  const [memberForm, setMemberForm] = useState({
    name:"", role:"", gender:"female", maxHours:100, skills:"",
    contractType:"業務委託", rank:"Middle", hourlyRate:5000, canPropose:false
  });

  const [selectedMember, setSelectedMember] = useState(null);
  const [recommendProject, setRecommendProject] = useState("");
  const [toast, setToast] = useState(null);
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterAvail, setFilterAvail]   = useState("all");
  const [filterMine, setFilterMine]     = useState(false);
  const [sortBy, setSortBy] = useState("none");
  const [openRoles, setOpenRoles] = useState(new Set());  // アコーディオン（空=全閉じ）
  const [searchQuery, setSearchQuery]   = useState("");       // dashboard
  const [timelineQuery, setTimelineQuery] = useState("");     // timeline
  const [memberQuery, setMemberQuery]   = useState("");       // members tab

  function showToast(msg) { setToast(msg); setTimeout(()=>setToast(null),2600); }

  function saveEvaluation(evalData) {
    setEvaluations(prev => {
      const filtered = prev.filter(e =>
        !(e.memberId===evalData.memberId && e.projectName===evalData.projectName && e.evaluatorId===evalData.evaluatorId)
      );
      return [...filtered, evalData];
    });
    setShowEvalModal(null);
    showToast(`${evalData.evaluatorName} が評価を保存しました`);
  }

  // ─── 計算 ─────────────────────────────────────
  const nextMonthIdx = MONTHS.indexOf(selectedMonth) + 1;
  const nextMonth = MONTHS[nextMonthIdx] ?? null;

  const nextMonthFreeIds = useMemo(() => {
    if (!nextMonth) return new Set();
    return new Set(
      members
        .filter(m => {
          const thisMonthOk = assignments.some(
            a => a.memberId===m.id && a.month===selectedMonth && CONFIRMED_STATUSES.includes(a.status)
          );
          const nextMonthOk = assignments.some(
            a => a.memberId===m.id && a.month===nextMonth && CONFIRMED_STATUSES.includes(a.status)
          );
          return thisMonthOk && !nextMonthOk;
        })
        .map(m => m.id)
    );
  }, [members, assignments, selectedMonth, nextMonth]);

  const monthlyStats = useMemo(() => {
    let sorted = [...members];

    // 肩書ソート
    if (sortBy !== "none") {
      sorted = sorted.filter(m=>m.role===sortBy).concat(sorted.filter(m=>m.role!==sortBy));
    }

    // 全文検索（名前・肩書・スキル・ランク・契約形態・案件名）
    const q = searchQuery.trim().toLowerCase();
    if (q) {
      const memberIdsWithProject = new Set(
        assignments
          .filter(a => a.month===selectedMonth && (a.projectName.toLowerCase().includes(q)||(a.clientName||"").toLowerCase().includes(q)) && (!filterMine||a.inputBy===currentUser?.name))
          .map(a => a.memberId)
      );
      sorted = sorted.filter(m =>
        m.name.toLowerCase().includes(q) ||
        m.role.toLowerCase().includes(q) ||
        (m.skills||[]).some(s=>s.toLowerCase().includes(q)) ||
        (m.rank||"").toLowerCase().includes(q) ||
        (m.contractType||"").includes(q) ||
        memberIdsWithProject.has(m.id)
      );
    }

    const stats = sorted.map(m => {
      const all = assignments.filter(a => a.memberId===m.id && a.month===selectedMonth);
      const confirmed = all.filter(a => CONFIRMED_STATUSES.includes(a.status));
      const totalHours = confirmed.reduce((s,a)=>s+a.hours, 0);
      const pct = Math.min(100, Math.round((totalHours/m.maxHours)*100));
      return { member:m, assigns:all, confirmedHours:totalHours, pct };
    });

    // 稼働空き状況フィルター
    if (filterAvail === "available")     return stats.filter(s=>s.pct < 100);
    if (filterAvail === "full")          return stats.filter(s=>s.pct >= 100);
    if (filterAvail === "nextMonthFree") return stats.filter(s=>nextMonthFreeIds.has(s.member.id));
    return stats;
  }, [members, assignments, selectedMonth, sortBy, searchQuery, filterAvail, nextMonthFreeIds]);


  // ─── 操作 ─────────────────────────────────────
  function updateAssignmentStatus(id, status) {
    setAssignments(p=>p.map(a=>a.id===id?{...a,status}:a));
    setShowStatusModal(null);
    showToast("ステータスを更新しました");
  }

  // updatedList: 更新後のassignment配列, deletedIds: 削除対象のid配列
  function bulkUpdateAssignments(updatedList, deletedIds=[]) {
    setAssignments(p => {
      let next = p.filter(a => !deletedIds.includes(a.id));
      if (updatedList.length > 0) {
        next = next.map(a => {
          const u = updatedList.find(u=>u.id===a.id);
          return u ? u : a;
        });
      }
      return next;
    });
    setEditAssignModal(null);


    const msg = deletedIds.length>0 && updatedList.length===0
      ? `${deletedIds.length}件の案件を削除しました`
      : "案件を更新しました";
    showToast(msg);
  }

  function deleteAssignment(id) {
    setAssignments(p=>p.filter(a=>a.id!==id));
    setEditAssignModal(null);
    showToast("案件を削除しました");
  }


  function addMember() {
    if (!memberForm.name||!memberForm.role) return;
    const colors = ["#E8C5A0","#A0C5E8","#C5A0E8","#A0E8C5","#E8A0C5","#E8E0A0"];
    setMembers(p=>[...p,{
      id:Date.now(), name:memberForm.name, role:memberForm.role, gender:memberForm.gender,
      maxHours:+memberForm.maxHours, avatar:memberForm.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(), color:colors[p.length%colors.length], skills:memberForm.skills.split(",").map(s=>s.trim()).filter(Boolean),
      contractType:memberForm.contractType, rank:memberForm.rank,
      hourlyRate:+memberForm.hourlyRate, canPropose:memberForm.canPropose, projectFitOverride:[]
    }]);
    setShowMemberModal(false);
    setMemberForm({name:"",role:"",gender:"female",maxHours:100,skills:"",contractType:"業務委託",rank:"Middle",hourlyRate:5000,canPropose:false});
    showToast("メンバーを追加しました");
  }

  function saveMemberEdit(updated) {
    setMembers(p=>p.map(m=>m.id===updated.id?updated:m));
    if (selectedMember?.id===updated.id) setSelectedMember(updated);
    setShowEditModal(null);
    showToast(`${updated.name} の情報を更新しました`);
  }

  function getRecommendations(projectName) {
    if (!projectName) return [];
    const lower = projectName.toLowerCase();
    return members.map(m => {
      let score = 50;
      const used = assignments.filter(a=>a.memberId===m.id&&a.month===selectedMonth&&["ongoing","approved"].includes(a.status)).reduce((s,a)=>s+a.hours,0);
      const pct = (used/m.maxHours)*100;
      if (pct>80) score-=30;
      if (m.canPropose) score+=10;
      if (m.gender==="female"&&(lower.includes("コスメ")||lower.includes("ウエディング")||lower.includes("fashion")||lower.includes("beauty")||lower.includes("ライフスタイル"))) score+=20;
      if (m.gender==="male"&&(lower.includes("スポーツ")||lower.includes("ゲーム")||lower.includes("car")||lower.includes("tech")||lower.includes("アウトドア"))) score+=15;
      return { member:m, score:Math.min(100,score), availability:Math.max(0,Math.round(100-pct)) };
    }).sort((a,b)=>b.score-a.score);
  }

  const recommendations = useMemo(()=>getRecommendations(recommendProject),[recommendProject,members,assignments,selectedMonth]);

  const clientStats = useMemo(() => {
    const map = {};
    assignments
      .filter(a => a.month === selectedMonth && a.clientName)
      .forEach(a => {
        if (!map[a.clientName]) map[a.clientName] = { name:a.clientName, hours:0, members:new Set(), projects:new Set() };
        map[a.clientName].hours += a.hours;
        map[a.clientName].members.add(a.memberId);
        map[a.clientName].projects.add(a.projectName);
      });
    return Object.values(map)
      .map(c => ({name:c.name, hours:c.hours, memberCount:c.members.size, projects:[...c.projects]}))
      .sort((a,b) => b.hours - a.hours);
  }, [assignments, selectedMonth]);

  useEffect(() => {
    localStorage.setItem("af_evaluations", JSON.stringify(evaluations));
  }, [evaluations]);

  useEffect(() => {
    function handleKeyDown(e) {
      if (e.key !== "Escape") return;
      if (showEvalModal)    { setShowEvalModal(null);    return; }
      if (showAssignModal)  { setShowAssignModal(false); setLockedMemberId(null); return; }
      if (showMemberModal)  { setShowMemberModal(false); return; }
      if (showEditModal)    { setShowEditModal(null);    return; }
      if (editAssignModal)  { setEditAssignModal(null);  return; }
      if (showImportModal)  { setShowImportModal(false); return; }
      if (showStatusModal)  { setShowStatusModal(null);  return; }
      if (dashboardPanel)   { setDashboardPanel(null);   return; }
      if (selectedMember)   { setSelectedMember(null);   return; }
    }
    window.addEventListener("keydown", handleKeyDown);
    return () => window.removeEventListener("keydown", handleKeyDown);
  }, [showAssignModal, showMemberModal, showEditModal, editAssignModal,
      showImportModal, showStatusModal, dashboardPanel, selectedMember, showEvalModal]);

  const inputByOptions = useMemo(
    () => members.filter(m => m.contractType === "正社員").map(m => m.name),
    [members]
  );

  // ─── 権限 ─────────────────────────────────────────
  const isAdmin = currentUser?.contractType === "正社員";

  // ─── UI ─────────────────────────────────────────
  if (!currentUser) {
    return <LoginScreen
      allMembers={members}
      onLogin={setCurrentUser}
    />;
  }

  return (
    <div style={{fontFamily:"'Helvetica Neue',sans-serif",background:"#FCF5EF",color:"#1E293B",display:"flex",height:"100vh",overflow:"hidden"}}>

      {/* Toast */}
      {toast&&<div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",background:"#0077FF",color:"#FFFFFF",padding:"12px 24px",borderRadius:100,fontWeight:700,fontSize:14,zIndex:999,whiteSpace:"nowrap",boxShadow:"0 8px 32px rgba(0,119,255,0.35)"}}><span style={{display:"inline-flex",alignItems:"center",gap:6}}><Icon name="check" size={14} color="#FFFFFF" strokeWidth={2.5}/>{toast}</span></div>}

      {/* ══ サイドバー ══ */}
      <div style={{width:180,background:"#FFFFFF",borderRight:"1px solid #FFE0C8",display:"flex",flexDirection:"column",alignItems:"stretch",flexShrink:0,zIndex:50,height:"100vh",overflow:"hidden"}}>
        {/* ロゴ */}
        <div style={{padding:"18px 20px 12px",flexShrink:0}}>
          <img src={LOGO_SRC} style={{width:"100%",display:"block"}} alt="AssignFlow logo"/>
        </div>
        {/* ナビ */}
        <div style={{display:"flex",flexDirection:"column",width:"100%",gap:2,paddingTop:4,paddingLeft:8,paddingRight:8,flexShrink:0}}>
          {[["dashboard","dashboard","ダッシュボード"],["timeline","calendar","タイムライン"],["members","users","メンバー"],["recommend","star","レコメンド"]].map(([k,icon,label])=>(
            <div key={k} onClick={()=>setActiveTab(k)}
              style={{cursor:"pointer",padding:"10px 12px",display:"flex",flexDirection:"row",alignItems:"center",gap:10,borderRadius:10,
                background:activeTab===k?"#EFF6FF":"transparent",
                color:activeTab===k?"#0077FF":"#94A3B8",transition:"all 0.15s"}}
              onMouseEnter={e=>{if(activeTab!==k){e.currentTarget.style.background="#FFF8F4";e.currentTarget.style.color="#64748B";}}}
              onMouseLeave={e=>{if(activeTab!==k){e.currentTarget.style.background="transparent";e.currentTarget.style.color="#94A3B8";}}}>
              <Icon name={icon} size={18} color="currentColor"/>
              <span style={{fontSize:13,fontWeight:activeTab===k?700:500}}>{label}</span>
            </div>
          ))}
        </div>
        <div style={{flex:1}}/>
        {/* ユーザー */}
        <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:10,borderTop:"1px solid #FFE0C8",flexShrink:0}}>
          <div style={{width:30,height:30,borderRadius:"50%",background:"#0077FF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#FFFFFF",flexShrink:0}}>
            {currentUser.name[0]}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:11,fontWeight:600,color:"#1E293B",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{currentUser.name}</div>
            <button onClick={()=>setCurrentUser(null)} style={{fontSize:10,color:"#94A3B8",background:"none",border:"none",cursor:"pointer",padding:0,display:"block",marginTop:1}}
              onMouseEnter={e=>e.currentTarget.style.color="#FF6B6B"} onMouseLeave={e=>e.currentTarget.style.color="#94A3B8"}>ログアウト</button>
          </div>
        </div>
      </div>

      {/* ══ コンテンツエリア ══ */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,height:"100vh",overflow:"hidden"}}>

        {/* トップバー */}
        <div style={{background:"#FCF5EF",borderBottom:"1px solid #FFE0C8",padding:"0 20px",display:"flex",alignItems:"center",gap:12,height:56,flexShrink:0,zIndex:100}}>
          {/* 月切替（メンバータブ以外） */}
          {activeTab!=="members"&&(
            <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
              <button onClick={()=>{const i=MONTHS.indexOf(selectedMonth);if(i>0)setSelectedMonth(MONTHS[i-1]);}}
                disabled={MONTHS.indexOf(selectedMonth)===0}
                style={{width:26,height:26,borderRadius:8,border:"1px solid #FFE0C8",background:"transparent",color:MONTHS.indexOf(selectedMonth)===0?"#CBD5E1":"#64748B",cursor:MONTHS.indexOf(selectedMonth)===0?"not-allowed":"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
              <select value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}
                style={{padding:"5px 8px",borderRadius:8,border:"1px solid #FFE0C8",background:"#FFFFFF",color:"#1E293B",fontSize:12,cursor:"pointer",flexShrink:0,fontWeight:600}}>
                {MONTHS.map(m=><option key={m} value={m}>{formatMonth(m)}</option>)}
              </select>
              <button onClick={()=>{const i=MONTHS.indexOf(selectedMonth);if(i<MONTHS.length-1)setSelectedMonth(MONTHS[i+1]);}}
                disabled={MONTHS.indexOf(selectedMonth)===MONTHS.length-1}
                style={{width:26,height:26,borderRadius:8,border:"1px solid #FFE0C8",background:"transparent",color:MONTHS.indexOf(selectedMonth)===MONTHS.length-1?"#CBD5E1":"#64748B",cursor:MONTHS.indexOf(selectedMonth)===MONTHS.length-1?"not-allowed":"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
            </div>
          )}
          {/* 検索 */}
          <div style={{position:"relative",flex:1,maxWidth:360}}>
            <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",display:"flex",alignItems:"center"}}><Icon name="search" size={14} color="#94A3B8" strokeWidth={2}/></span>
            <input
              value={activeTab==="dashboard"?searchQuery:activeTab==="timeline"?timelineQuery:activeTab==="members"?memberQuery:""}
              onChange={e=>{
                if(activeTab==="dashboard") setSearchQuery(e.target.value);
                else if(activeTab==="timeline") setTimelineQuery(e.target.value);
                else if(activeTab==="members") setMemberQuery(e.target.value);
              }}
              placeholder={
                activeTab==="dashboard"?"名前・スキル・肩書・ランクで検索...":
                activeTab==="timeline"?"メンバーを絞り込む...":

                "検索..."

              style={{width:"100%",padding:"7px 28px 7px 28px",borderRadius:10,border:"1px solid #FFE0C8",background:"#FFFFFF",color:"#1E293B",fontSize:12,outline:"none",boxSizing:"border-box",
                borderColor:(activeTab==="dashboard"?searchQuery:activeTab==="timeline"?timelineQuery:memberQuery)?"#0077FF":"#FFE0C8"}}
            />
            {(activeTab==="dashboard"?searchQuery:activeTab==="timeline"?timelineQuery:memberQuery)&&(
              <button onClick={()=>{

                else if(activeTab==="timeline") setTimelineQuery("");
                else if(activeTab==="members") setMemberQuery("");

            )}
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:6,flexShrink:0}}>

            {isAdmin&&<button onClick={()=>setShowMemberModal(true)} style={{padding:"6px 11px",borderRadius:10,border:"1px solid #FFE0C8",background:"transparent",color:"#64748B",cursor:"pointer",fontSize:12}}>+ メンバー</button>}
            <button onClick={()=>setShowAssignModal(true)} style={{padding:"6px 13px",borderRadius:10,border:"none",background:"#0077FF",color:"#FFFFFF",cursor:"pointer",fontSize:12,fontWeight:700}}>+ 工数入力</button>
          </div>
        </div>

        {/* メインコンテンツ（スクロール可能） */}
        <div style={{padding:"22px 28px",flex:1,overflowY:"auto"}}>

        {/* ══════════════ DASHBOARD ══════════════ */}
        {activeTab==="dashboard"&&(
          <div>

            {/* ── 翌月空き予告バナー ── */}
            {nextMonth && nextMonthFreeIds.size > 0 && (
              <div onClick={()=>setFilterAvail(filterAvail==="nextMonthFree"?"all":"nextMonthFree")}
                style={{background:filterAvail==="nextMonthFree"?"rgba(254,167,53,0.10)":"#FFFFFF",
                  border:`1px solid ${filterAvail==="nextMonthFree"?"#FEA735":"#FFE0C8"}`,
                  borderRadius:12,padding:"10px 16px",marginBottom:14,cursor:"pointer",
                  display:"flex",alignItems:"center",justifyContent:"space-between",transition:"all 0.15s"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor="#FEA735";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=filterAvail==="nextMonthFree"?"#FEA735":"#FFE0C8";}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <Icon name="bell" size={16} color="#FEA735"/>
                  <span style={{fontSize:13,color:"#64748B"}}>
                    <span style={{fontWeight:800,color:"#FEA735"}}>{nextMonthFreeIds.size}名</span>
                    {`が翌月（${nextMonth.replace(/(\d+)-(\d+)/,(_,y,m)=>`${y}年${parseInt(m)}月`)}）の案件が未定です`}
                  </span>
                </div>
                <span style={{fontSize:11,color:filterAvail==="nextMonthFree"?"#FEA735":"#CBD5E1",fontWeight:700,flexShrink:0}}>
                  {filterAvail==="nextMonthFree"?"解除 ×":"一覧を見る →"}
                </span>
              </div>
            )}

            {/* ── フィルターバー ── */}
            <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center",flexWrap:"wrap"}}>
              <div style={{display:"flex",gap:3,background:"#FFF8F4",borderRadius:10,padding:3,flexShrink:0}}>
                {[["all","全員"],["available","空きあり"],["full","満杯"]].map(([v,label])=>(
                  <button key={v} onClick={()=>setFilterAvail(v)}
                    style={{padding:"5px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,transition:"all 0.15s",
                      background:filterAvail===v?(v==="available"?"#4ECDC4":v==="full"?"#FF6B6B":"#0077FF"):"transparent", color:filterAvail===v?"#FFFFFF":"#64748B"}}>
                    {label}
                  </button>
                ))}
                {nextMonth&&nextMonthFreeIds.size>0&&(
                  <button onClick={()=>setFilterAvail(filterAvail==="nextMonthFree"?"all":"nextMonthFree")}
                    style={{padding:"5px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,transition:"all 0.15s",
                      background:filterAvail==="nextMonthFree"?"#FEA735":"transparent",
                      color:filterAvail==="nextMonthFree"?"#FFFFFF":"#94A3B8"}}>
                    翌月空き
                  </button>
                )}
                <button onClick={()=>setFilterMine(v=>!v)}
                  style={{padding:"5px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,transition:"all 0.15s",
                    background:filterMine?"#0077FF":"transparent", color:filterMine?"#FFFFFF":"#64748B"}}>
                  自分のみ
                </button>
              </div>
              <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}
                style={{padding:"7px 10px",borderRadius:10,border:"1px solid #FFE0C8",background:"#FFFFFF",color:"#1E293B",fontSize:12,cursor:"pointer",flexShrink:0}}>
                <option value="all">全ステータス</option>
                {ASSIGNMENT_STATUSES.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
              </select>
              {/* フィルターチップ */}
              {filterAvail!=="all"&&(
                <div style={{display:"flex",alignItems:"center",gap:4,padding:"3px 10px 3px 8px",borderRadius:20,background:filterAvail==="nextMonthFree"?"rgba(254,167,53,0.12)":"#EFF6FF",border:`1px solid ${filterAvail==="nextMonthFree"?"#FEA735":"#BFDBFE"}`,fontSize:11,fontWeight:700,color:filterAvail==="nextMonthFree"?"#FEA735":"#0077FF"}}>
                  <span>{filterAvail==="available"?"空きあり":filterAvail==="full"?"満杯":"翌月空き"}</span>
                  <button onClick={()=>setFilterAvail("all")} style={{background:"none",border:"none",color:filterAvail==="nextMonthFree"?"#FEA735":"#0077FF",cursor:"pointer",fontSize:12,padding:0,lineHeight:1,marginLeft:2}}>×</button>
                </div>
              )}
              {filterMine&&(
                <div style={{display:"flex",alignItems:"center",gap:4,padding:"3px 10px 3px 8px",borderRadius:20,background:"#EFF6FF",border:"1px solid #BFDBFE",fontSize:11,fontWeight:700,color:"#0077FF"}}>
                  <span>自分のみ</span>
                  <button onClick={()=>setFilterMine(false)} style={{background:"none",border:"none",color:"#0077FF",cursor:"pointer",fontSize:12,padding:0,lineHeight:1,marginLeft:2}}>×</button>
                </div>
              )}
              {filterStatus!=="all"&&(
                <div style={{display:"flex",alignItems:"center",gap:4,padding:"3px 10px 3px 8px",borderRadius:20,background:"#EFF6FF",border:"1px solid #BFDBFE",fontSize:11,fontWeight:700,color:"#0077FF"}}>
                  <span>{ASSIGNMENT_STATUSES.find(s=>s.key===filterStatus)?.label}</span>
                  <button onClick={()=>setFilterStatus("all")} style={{background:"none",border:"none",color:"#0077FF",cursor:"pointer",fontSize:12,padding:0,lineHeight:1,marginLeft:2}}>×</button>
                </div>
              )}
              <span style={{fontSize:11,color:"#94A3B8",marginLeft:"auto"}}>{monthlyStats.length}名 / {members.length}名</span>
            </div>

            {/* 結果なし */}
            {monthlyStats.length===0&&(
              <div style={{textAlign:"center",padding:"60px 0"}}>
                <div style={{marginBottom:8,display:"flex",justifyContent:"center"}}><Icon name="search" size={32} color="#CBD5E1" strokeWidth={1}/></div>
                <div style={{fontSize:13, color: "#94A3B8"}}>「{searchQuery}」に一致するメンバーが見つかりません</div>
                <button onClick={()=>{setSearchQuery("");setFilterAvail("all");setFilterStatus("all");}}
                  style={{marginTop:10,padding:"6px 14px",borderRadius:10,border:"1px solid #FFE0C8",background:"transparent", color: "#0077FF",cursor:"pointer",fontSize:12}}>
                  絞り込みをリセット
                </button>
              </div>
            )}

            {/* ── 肩書グループ別アコーディオン ── */}
            {(()=>{
              // 肩書でグループ化（出現順）
              const roleOrder = [...new Set(monthlyStats.map(s=>s.member.role))].sort();
              const groups = roleOrder.map(role=>({
                role,
                stats: monthlyStats.filter(s=>s.member.role===role)
              })).filter(g=>g.stats.length>0);
              const PREVIEW = 3; // 折りたたみ時に表示する件数
              return groups.map(({role, stats})=>{
                const isCollapsed = !openRoles.has(role) && !searchQuery.trim() && filterAvail==="all" && filterStatus==="all";
                const filteredStats = filterMine ? stats.filter(s=>s.assigns.some(a=>a.inputBy===currentUser.name)) : stats;
                if(filteredStats.length===0) return null;
                const visibleStats = isCollapsed ? filteredStats.slice(0,PREVIEW) : filteredStats;
                const fullCount = filteredStats.length;
                const availCount = filteredStats.filter(s=>s.pct<100).length;
                return (
                  <div key={role} style={{marginBottom:20}}>
                    {/* グループヘッダー */}
                    <div onClick={()=>setOpenRoles(p=>{const n=new Set(p);n.has(role)?n.delete(role):n.add(role);return n;})}
                      style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,cursor:"pointer",userSelect:"none",padding:"6px 2px"}}
                      onMouseEnter={e=>e.currentTarget.querySelector(".role-label").style.color="#1E293B"}
                      onMouseLeave={e=>e.currentTarget.querySelector(".role-label").style.color="#94A3B8"}>
                      <span style={{fontSize:12,fontWeight:700,letterSpacing:"2px", color: "#0077FF",textTransform:"uppercase"}}>{role}</span>
                      <span className="role-label" style={{fontSize:11, color: "#94A3B8",transition:"color 0.15s"}}>
                        {fullCount}名{availCount<fullCount ? ` · 空き${availCount}名` : ""}
                      </span>
                      <div style={{flex:1,height:1,background:"#FFE0C8",marginLeft:4}}/>
                      <span style={{fontSize:11, color: "#444",fontWeight:700}}>{isCollapsed?"▼":"▲"}</span>
                    </div>
                    {/* カードグリッド */}
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:10}}>
                      {visibleStats.map(({member:m,assigns,confirmedHours,pct})=>{
                        const baseAssigns = filterStatus==="all" ? assigns : assigns.filter(a=>a.status===filterStatus);
                        const _sq = searchQuery.trim().toLowerCase();
                        const _sqMatchesClientOrProject = _sq && assigns.some(a=>(a.clientName||"").toLowerCase().includes(_sq)||a.projectName.toLowerCase().includes(_sq));
                        const visibleAssigns = (filterMine ? baseAssigns.filter(a=>a.inputBy===currentUser.name) : baseAssigns)
                          .filter(a=>!_sqMatchesClientOrProject||((a.clientName||"").toLowerCase().includes(_sq)||a.projectName.toLowerCase().includes(_sq)));
                        const freeHours = m.maxHours - confirmedHours;
                        const barColor = pct>=100?"#FF6B6B":pct>70?"#FEA735":"#4ECDC4";
                        return (
                          <div key={m.id} onClick={()=>setDashboardPanel(m)} style={{background:"#FFFFFF",borderRadius:16,padding:18,border:"1px solid #FFE0C8",transition:"border-color 0.2s, box-shadow 0.2s, transform 0.15s",cursor:"pointer",boxShadow:"0 4px 16px rgba(0,119,255,0.10)"}}
                            onMouseEnter={e=>{e.currentTarget.style.borderColor="#0077FF";e.currentTarget.style.boxShadow="0 4px 20px rgba(0,119,255,0.12),0 0 0 1px rgba(0,119,255,0.25)";e.currentTarget.style.transform="translateY(-1px)";}}
                            onMouseLeave={e=>{e.currentTarget.style.borderColor="#FFE0C8";e.currentTarget.style.boxShadow="0 4px 16px rgba(0,119,255,0.10)";e.currentTarget.style.transform="translateY(0)";}}>

                    {/* ── ヘッダー ── */}
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:9}}>
                        <Avatar member={m} size={40}/>
                        <div>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontWeight:800,fontSize:15,lineHeight:1.2}}>{m.name}</span>
                            {nextMonthFreeIds.has(m.id)&&<span style={{fontSize:9,padding:"1px 7px",borderRadius:10,background:"rgba(254,167,53,0.15)",color:"#FEA735",fontWeight:700,flexShrink:0}}>翌月空き</span>}
                          </div>
                          <div style={{fontSize:11, color: "#94A3B8",marginTop:2}}>{m.role} · <span style={{color:RANK_COLORS[m.rank]}}>{m.rank}</span></div>
                        </div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>

                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        <Tag label={r.member.rank} color={RANK_COLORS[r.member.rank]}/>
                        <Tag label={r.member.contractType} color={CONTRACT_COLORS[r.member.contractType]}/>
                        {r.member.canPropose&&<Tag label="提案OK" color="#0077FF"/>}
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:18,fontWeight:900, color:i===0?"#0077FF":"#888"}}>{r.score}</div>
                      <div style={{fontSize:10, color: "#4ECDC4"}}>空き {r.availability}%</div>
                      <div style={{fontSize:10, color: "#64748B"}}>¥{r.member.hourlyRate.toLocaleString()}/h</div>
                    </div>
                  </div>
                ))}
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:800,marginBottom:12,color:"#64748B",letterSpacing:"0.05em"}}>
                  クライアント別 · {selectedMonth.replace(/^(\d{4})-(\d{2})$/,(_,y,m)=>`${y}年${m}月`)}
                </div>
                {clientStats.length===0 && (
                  <div style={{color:"#475569",fontSize:12,textAlign:"center",marginTop:40}}>この月のデータなし</div>
                )}
                {clientStats.map(cs=>(
                  <div key={cs.name} style={{marginBottom:8,background:"#FFFFFF",borderRadius:14,border:"1px solid #FFE0C8",padding:"12px 14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <div style={{fontSize:13,fontWeight:700}}>{cs.name}</div>
                      <div style={{display:"flex",gap:10,flexShrink:0}}>
                        <span style={{fontSize:11,color:"#4ECDC4",fontWeight:700}}>{cs.hours}h</span>
                        <span style={{fontSize:11,color:"#94A3B8"}}>{cs.memberCount}名</span>
                      </div>
                    </div>
                    <div style={{fontSize:10,color:"#94A3B8",lineHeight:1.6}}>{cs.projects.join(" · ")}</div>
                  </div>
                ))}
              </div>
            </div>
            {/* ── 人気メンバーランキング ── */}
            {(()=>{
              const ranked = members
                .map(mb=>({mb,avg:calcMemberAvgRatings(mb.id,evaluations||[])}))
                .filter(({avg})=>avg!==null)
                .sort((a,b)=>b.avg.total-a.avg.total)
                .slice(0,10);
              if(!ranked.length) return null;
              return (
                <div style={{marginTop:28}}>
                  <div style={{fontSize:14,fontWeight:800,marginBottom:14,color:"#1E293B",letterSpacing:"0.02em",display:"flex",alignItems:"center",gap:6}}><Icon name="star" size={14} color="#FEA735" style={{marginRight:2}}/> 人気メンバーランキング</div>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {ranked.map(({mb,avg},i)=>{
                      const medalColor=i<3?["#F59E0B","#94A3B8","#CD7F32"][i]:"#CBD5E1";
                      return (
                        <div key={mb.id} onClick={()=>setDashboardPanel(mb)}
                          style={{display:"flex",alignItems:"center",gap:14,padding:"12px 16px",background:"#FFFFFF",borderRadius:14,border:`1px solid ${i===0?"#FEA735":"#FFE0C8"}`,cursor:"pointer",transition:"border-color 0.15s"}}
                          onMouseEnter={e=>e.currentTarget.style.borderColor="#0077FF"}
                          onMouseLeave={e=>e.currentTarget.style.borderColor=i===0?"#FEA735":"#FFE0C8"}>
                          <div style={{width:28,textAlign:"center",fontSize:i<3?18:13,fontWeight:900,color:medalColor,flexShrink:0}}>
                            {i<3?["🥇","🥈","🥉"][i]:`${i+1}`}
                          </div>
                          <div style={{width:38,height:38,borderRadius:"50%",background:mb.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"#FFFFFF",flexShrink:0}}>
                            {mb.name[0]}
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:13,fontWeight:700,color:"#1E293B"}}>{mb.name}</div>
                            <div style={{display:"flex",gap:4,marginTop:3,flexWrap:"wrap"}}>
                              <Tag label={mb.rank} color={RANK_COLORS[mb.rank]}/>
                              <Tag label={mb.role} color="#64748B" bg="rgba(100,116,139,0.1)"/>
                            </div>
                          </div>
                          <div style={{textAlign:"right",flexShrink:0}}>
                            <div style={{fontSize:18,fontWeight:900,color:"#FEA735"}}>★ {avg.total}</div>
                            <div style={{fontSize:10,color:"#94A3B8"}}>{avg.count}件の評価</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}
          </div>
        )}
        </div>{/* /メインコンテンツ */}
      </div>{/* /コンテンツエリア */}


      {/* ══════════════ PANEL: ダッシュボード詳細 ══════════════ */}
      {dashboardPanel&&(
        <>
          <div onClick={()=>setDashboardPanel(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:199}}/>
          <DashboardPanel
            member={dashboardPanel}
            members={members}
            assignments={assignments}
            evaluations={evaluations}
            selectedMonth={selectedMonth}
            onClose={()=>setDashboardPanel(null)}
            onEdit={(m)=>setShowEditModal({...m})}
            onAddAssign={(m)=>{setLockedMemberId(m.id);setForm(p=>({...p,memberId:String(m.id),month:selectedMonth,projectName:"",hours:"",status:"pending",inputBy:inputByOptions[0]}));setShowAssignModal(true);}}
            isAdmin={isAdmin}
            currentUser={currentUser}
          />
        </>
      )}

      {/* ══════════════ MODAL: 工数入力 ══════════════ */}
      {showAssignModal&&(
        <AssignModal
          members={members}
          inputByOptions={inputByOptions}
          lockedMemberId={lockedMemberId}
          initialForm={form}
          isAdmin={isAdmin}
          currentUserName={currentUser.name}
          onAdd={(newAssignments)=>{
            setAssignments(p=>[...p,...newAssignments]);
            setShowAssignModal(false);
            setLockedMemberId(null);
            setForm({memberId:"",projectName:"",clientName:"",hours:"",month:"2025-03",inputBy:"管理者",status:"pending"});
            showToast(`${newAssignments.length}件の工数を追加しました`);
          }}
          onClose={()=>{setShowAssignModal(false);setLockedMemberId(null);}}
        />
      )}

      {/* ══════════════ MODAL: ステータス変更 ══════════════ */}
      {showStatusModal&&(
        <Modal title="ステータス変更" onClose={()=>setShowStatusModal(null)} width={360}>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:700, color: "#CCC",marginBottom:4}}>{showStatusModal.projectName}</div>
            <div style={{fontSize:12, color: "#64748B"}}>{showStatusModal.hours}h · {formatMonth(showStatusModal.month)} · by {showStatusModal.inputBy}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {ASSIGNMENT_STATUSES.map(s=>(
              <button key={s.key} onClick={()=>updateAssignmentStatus(showStatusModal.id,s.key)}
                style={{padding:"11px 16px",borderRadius:10,border:`1px solid ${showStatusModal.status===s.key?s.color:"#FFE0C8"}`,background:showStatusModal.status===s.key?s.bg:"transparent", color:showStatusModal.status===s.key?s.color:"#94A3B8",cursor:"pointer",fontSize:13,fontWeight:700,textAlign:"left",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:8,width:8,height:8,borderRadius:"50%",background:s.color,display:"inline-block",flexShrink:0}}/>
                {s.label}
                {showStatusModal.status===s.key&&<span style={{marginLeft:"auto",fontSize:11}}>現在</span>}
              </button>
            ))}
          </div>
        </Modal>
      )}

      {/* ══════════════ MODAL: 案件編集 ══════════════ */}
      {editAssignModal&&(
        <EditAssignModal
          assignment={editAssignModal}
          allAssignments={assignments}
          members={members}
          inputByOptions={inputByOptions}
          isAdmin={isAdmin}
          currentUserName={currentUser.name}
          onSave={bulkUpdateAssignments}
          onDelete={deleteAssignment}
          onClose={()=>setEditAssignModal(null)}
        />
      )}

      {/* ══════════════ MODAL: メンバー追加 ══════════════ */}
      {showMemberModal&&(
        <Modal title="メンバー追加" onClose={()=>setShowMemberModal(false)}>
          <MemberForm form={memberForm} setForm={setMemberForm} onSave={addMember} onCancel={()=>setShowMemberModal(false)} saveLabel="追加する"/>
        </Modal>
      )}

      {/* ══════════════ MODAL: メンバー編集 ══════════════ */}
      {showEditModal&&(
        <Modal title="プロフィール編集" onClose={()=>setShowEditModal(null)}>
          <MemberEditForm initialData={showEditModal} onSave={saveMemberEdit} onCancel={()=>setShowEditModal(null)} isAdmin={isAdmin}/>
        </Modal>
      )}

      {/* ══════════════ MODAL: 案件評価 ══════════════ */}
      {showEvalModal&&currentUser&&(
        <EvaluationModal
          assignment={showEvalModal.assignment}
          member={showEvalModal.member}
          evaluations={evaluations}
          currentUser={currentUser}
          onSave={saveEvaluation}
          onClose={()=>setShowEvalModal(null)}
        />
      )}

      {/* ══════════════ MODAL: CSV インポート ══════════════ */}
      {showImportModal&&(
        <ImportModal
          members={members}
          onImport={(newAssigns)=>{
            setAssignments(p=>[...p,...newAssigns]);
            setShowImportModal(false);
            showToast(`${newAssigns.length}件をインポートしました`);
          }}
          onClose={()=>setShowImportModal(false)}
        />
      )}
    </div>
  );
}

// ─── 案件編集モーダル（複数月対応）──────────────────────────
function EditAssignModal({ assignment, allAssignments, members, inputByOptions, isAdmin, currentUserName, onSave, onDelete, onClose }) {
  const IS2 = { width:"100%", padding:"10px 13px", borderRadius:10, border:"1px solid #FFE0C8", background:"#FFF8F4", color:"#1E293B", fontSize:13, outline:"none", boxSizing:"border-box" };
  const member = members.find(m=>m.id===assignment.memberId);

  // 同じメンバー・同じ案件名の全月アサイン（常に全月まとめて扱う）
  const allInScope = useMemo(() =>
    allAssignments
      .filter(a => a.memberId === assignment.memberId && a.projectName === assignment.projectName)
      .sort((a,b)=>a.month.localeCompare(b.month))
  , [allAssignments, assignment]);

  const isMultiMonth = allInScope.length > 1;

  const [projectName, setProjectName] = useState(assignment.projectName);
  const [clientName, setClientName]   = useState(assignment.clientName||"");
  const [status, setStatus]           = useState(assignment.status);
  const [inputBy, setInputBy]         = useState(assignment.inputBy);
  const [monthHours, setMonthHours]   = useState(() => Object.fromEntries(allInScope.map(a=>[a.id, a.hours])));
  const [confirmDelete, setConfirmDelete] = useState(false);

  const totalHours = allInScope.reduce((s,a)=>s+(+(monthHours[a.id])||0), 0);
  const maxH = Math.max(1, ...allInScope.map(a=>+(monthHours[a.id])||0));

  function handleSave() {
    onSave(allInScope.map(a=>({...a, projectName, clientName, status, inputBy, hours: +(monthHours[a.id] ?? a.hours)})), []);
  }

  function handleDelete() {
    onSave([], allInScope.map(a=>a.id));
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={onClose}>
      <div style={{background:"#FFFFFF",borderRadius:24,padding:26,width:450,border:"1px solid #FFE0C8",maxHeight:"92vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>

        {/* ── ヘッダー ── */}
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16}}>
          <div>
            <h2 style={{margin:0,fontSize:18,fontWeight:800}}>案件を編集</h2>
            {member&&<div style={{fontSize:11, color: "#64748B",marginTop:4,display:"flex",alignItems:"center",gap:6}}><Avatar member={member} size={16} fontSize={6}/>{member.name}</div>}
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none", color: "#94A3B8",cursor:"pointer",fontSize:20,lineHeight:1}}>×</button>
        </div>

        {/* ── 期間バナー（複数月の場合のみ） ── */}
        {isMultiMonth&&(
          <div style={{marginBottom:14,padding:"8px 12px",background:"rgba(0,119,255,0.07)",border:"1px solid rgba(0,119,255,0.2)",borderRadius:10,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:11, color: "#0077FF",fontWeight:700,flexShrink:0}}>✦ {allInScope.length}ヶ月にまたがる案件</span>
            {allInScope.map(a=>(
              <span key={a.id} style={{fontSize:10,padding:"2px 8px",borderRadius:20,
                background:a.id===assignment.id?"rgba(0,119,255,0.2)":"rgba(80,80,100,0.15)", color:a.id===assignment.id?"#0077FF":"#777",fontWeight:600}}>
                {a.month.split("-")[1]}月
              </span>
            ))}
          </div>
        )}

        {/* ── 案件名 ── */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:11, color: "#94A3B8",fontWeight:700,display:"block",marginBottom:5}}>案件名</label>
          <input value={projectName} onChange={e=>setProjectName(e.target.value)} style={{...IS2}}/>
        </div>

        {/* ── クライアント名 ── */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:11, color:"#94A3B8",fontWeight:700,display:"block",marginBottom:5}}>クライアント名</label>
          <input value={clientName} onChange={e=>setClientName(e.target.value)} style={{...IS2}}/>
        </div>

        {/* ── ステータス ── */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:11, color: "#94A3B8",fontWeight:700,display:"block",marginBottom:5}}>ステータス</label>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:4}}>
            {ASSIGNMENT_STATUSES.map(s=>(
              <button key={s.key} onClick={()=>setStatus(s.key)}
                style={{padding:"6px 2px",borderRadius:10,border:`1px solid ${status===s.key?s.color:"#FFE0C8"}`,
                  background:status===s.key?s.bg:"transparent", color:status===s.key?s.color:"#94A3B8",cursor:"pointer",fontSize:10,fontWeight:700}}>
                {s.label}
              </button>
            ))}
          </div>
        </div>

        {/* ── 月ごとの時間数 ── */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:11, color: "#94A3B8",fontWeight:700,display:"block",marginBottom:5}}>
            {isMultiMonth ? `月ごとの時間数（合計 ${totalHours}h）` : "時間数 (h)"}
          </label>
          <div style={{background:"#FCF5EF",borderRadius:10,padding:"10px 12px",display:"flex",flexDirection:"column",gap:7}}>
            {allInScope.map(a=>(
              <div key={a.id} style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:12,width:40,flexShrink:0,fontWeight:a.id===assignment.id?700:400, color:a.id===assignment.id?"#0077FF":"#888"}}>
                  {a.month.split("-")[1]}月
                </span>
                {isMultiMonth&&(
                  <div style={{flex:1,height:4,background:"#FFD9C0",borderRadius:2,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:2,transition:"width 0.2s",
                      width:`${Math.min(100,((+(monthHours[a.id])||0)/maxH)*100)}%`,
                      background:a.id===assignment.id?"linear-gradient(90deg,#0077FF,#00C3FF)":"linear-gradient(90deg,#4ECDC4,#6EE7E0)"}}/>
                  </div>
                )}
                <input type="number" value={monthHours[a.id]??""} onChange={e=>setMonthHours(p=>({...p,[a.id]:e.target.value}))}
                  style={{...IS2,width:64,textAlign:"center",padding:"5px 6px",fontSize:12,
                    borderColor:a.id===assignment.id?"rgba(0,119,255,0.4)":"#FFE0C8"}}/>
                <span style={{fontSize:11, color: "#94A3B8",flexShrink:0}}>h</span>
              </div>
            ))}
          </div>
        </div>

        {/* ── 入力者 ── */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:11, color: "#94A3B8",fontWeight:700,display:"block",marginBottom:5}}>入力者</label>
          <div style={{...IS2, color:"#94A3B8", cursor:"not-allowed", userSelect:"none"}}>{assignment.inputBy}</div>
        </div>

        {/* ── カラー ── */}
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",gap:7}}>
          </div>
        </div>

        {/* ── アクション ── */}
        {!confirmDelete ? (
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setConfirmDelete(true)}
              style={{padding:"10px 12px",borderRadius:10,border:"1px solid rgba(255,107,107,0.3)",background:"rgba(255,107,107,0.06)", color: "#FF6B6B",cursor:"pointer",fontSize:12,fontWeight:700}}>
              削除
            </button>
            <button onClick={onClose} style={{flex:1,padding:11,borderRadius:10,border:"1px solid #FFE0C8",background:"transparent", color: "#777",cursor:"pointer",fontSize:13}}>キャンセル</button>
            <button onClick={handleSave}
              style={{flex:2,padding:11,borderRadius:10,border:"none",background:"#0077FF", color: "#FFFFFF",cursor:"pointer",fontSize:13,fontWeight:700}}>
              {isMultiMonth?`${allInScope.length}ヶ月分を保存`:"保存する"}
            </button>
          </div>
        ) : (
          <div style={{background:"rgba(255,107,107,0.06)",border:"1px solid rgba(255,107,107,0.2)",borderRadius:10,padding:"14px"}}>
            <div style={{fontSize:12, color: "#FF6B6B",marginBottom:12}}>
              {isMultiMonth?`${allInScope.length}ヶ月分をまとめて削除しますか？`:"この案件を削除しますか？"}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setConfirmDelete(false)} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid #FFE0C8",background:"transparent", color: "#777",cursor:"pointer",fontSize:12}}>戻る</button>
              <button onClick={handleDelete} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:"#FF6B6B", color: "#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>削除する</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
// ─── 工数入力モーダル（期間対応）─────────────────────────
function AssignModal({ members, inputByOptions, lockedMemberId, initialForm, isAdmin, currentUserName, onAdd, onClose }) {
  const IS2 = { width:"100%", padding:"10px 13px", borderRadius:10, border:"1px solid #FFE0C8", background:"#FFF8F4", color:"#1E293B", fontSize:13, outline:"none", boxSizing:"border-box" };

  const [inputBy, setInputBy]       = useState(currentUserName);
  const [memberId, setMemberId]     = useState(initialForm.memberId||"");
  const [memberSearch, setMemberSearch] = useState("");
  const [memberDropdown, setMemberDropdown] = useState(false);
  const [clientName, setClientName]   = useState(initialForm.clientName||"");
  const [projectName, setProjectName] = useState(initialForm.projectName||"");
  const [status, setStatus]         = useState(initialForm.status||"pending");
  const [startMonth, setStartMonth] = useState(initialForm.month||MONTHS[0]);
  const [endMonth, setEndMonth]     = useState(initialForm.month||MONTHS[0]);
  const [defaultHours, setDefaultHours] = useState("40");
  const [monthHours, setMonthHours] = useState({});

  const spanMonths = useMemo(() => {
    const si = MONTHS.indexOf(startMonth);
    const ei = MONTHS.indexOf(endMonth);
    if (si<0||ei<0||ei<si) return [];
    return MONTHS.slice(si, ei+1);
  }, [startMonth, endMonth]);

  function getHoursForMonth(mo) {
    return monthHours[mo] !== undefined ? monthHours[mo] : defaultHours;
  }

  function handleSubmit() {
    const mid = lockedMemberId || (+memberId);
    if (!mid || !projectName || spanMonths.length===0) return;
    onAdd(spanMonths.map((mo,i)=>({
      id: Date.now()+i, memberId:+mid, projectName,
      hours: +(getHoursForMonth(mo)||0), month:mo, inputBy, status, clientName
    })));
  }

  const lockedMember = lockedMemberId ? members.find(m=>m.id===lockedMemberId) : null;
  const totalSpanHours = spanMonths.reduce((s,mo)=>s+(+(getHoursForMonth(mo))||0), 0);
  const isMultiMonth = spanMonths.length > 1;

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={onClose}>
      <div style={{background:"#FFFFFF",borderRadius:24,padding:28,width:460,border:"1px solid #FFE0C8",maxHeight:"92vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
          <h2 style={{margin:0,fontSize:19,fontWeight:800}}>工数入力</h2>
          <button onClick={onClose} style={{background:"transparent",border:"none", color: "#94A3B8",cursor:"pointer",fontSize:20,lineHeight:1}}>×</button>
        </div>

        {/* 入力者 */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:11, color: "#64748B",fontWeight:700,display:"block",marginBottom:5}}>入力者</label>
          <div style={{...IS2, color:"#94A3B8", cursor:"not-allowed", userSelect:"none"}}>{currentUserName}</div>
        </div>

        {/* メンバー */}
        {lockedMember ? (
          <div style={{marginBottom:12,padding:"10px 13px",borderRadius:10,border:"1px solid #FFE0C8",background:"#FCF5EF",display:"flex",alignItems:"center",gap:10}}>
            <Avatar member={lockedMember} size={28} fontSize={9}/>
            <div><div style={{fontSize:12,fontWeight:700, color: "#1E293B"}}>{lockedMember.name}</div><div style={{fontSize:10, color: "#94A3B8"}}>アサイン先（固定）</div></div>
          </div>
        ) : (
          <div style={{marginBottom:12,position:"relative"}}>
            <label style={{fontSize:11, color: "#64748B",fontWeight:700,display:"block",marginBottom:5}}>アサイン先メンバー</label>
            {memberId && !memberDropdown ? (
              <div onClick={()=>{setMemberDropdown(true);setMemberSearch("");}}
                style={{...IS2,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span>{members.find(m=>m.id===+memberId)?.name} <span style={{color:"#94A3B8",fontSize:11}}>({members.find(m=>m.id===+memberId)?.rank})</span></span>
                <span style={{color:"#94A3B8"}}>▾</span>
              </div>
            ) : (
              <div>
                <input autoFocus={memberDropdown} placeholder="名前で検索..." value={memberSearch}
                  onChange={e=>{setMemberSearch(e.target.value);setMemberDropdown(true);}}
                  onFocus={()=>setMemberDropdown(true)} style={{...IS2}}/>
                {memberDropdown && (
                  <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#FFF0E8",border:"1px solid #FFE0C8",borderRadius:10,zIndex:50,maxHeight:200,overflowY:"auto",marginTop:3}}>
                    {members.filter(m=>!memberSearch||m.name.includes(memberSearch)||(m.rank||"").toLowerCase().includes(memberSearch.toLowerCase())).map(m=>(
                      <div key={m.id} onMouseDown={e=>{e.preventDefault();setMemberId(String(m.id));setMemberSearch("");setMemberDropdown(false);}}
                        style={{padding:"9px 13px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid #FFFFFF"}}
                        onMouseEnter={e=>e.currentTarget.style.background="#FFE0C8"}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        <span style={{fontSize:13, color: "#1E293B",fontWeight:600}}>{m.name}</span>

                  </div>
                )}
              </div>
            )}

        )}

        {/* クライアント名 */}
        <div style={{marginBottom:12}}>

        </div>

        {/* 案件名 */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:11, color: "#64748B",fontWeight:700,display:"block",marginBottom:5}}>案件名</label>
          <input placeholder="例: ABCブランドリニューアル" value={projectName} onChange={e=>setProjectName(e.target.value)} style={{...IS2}}/>
        </div>

        {/* ステータス */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:11, color: "#64748B",fontWeight:700,display:"block",marginBottom:5}}>ステータス</label>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:4}}>
            {ASSIGNMENT_STATUSES.map(s=>(
              <button key={s.key} onClick={()=>setStatus(s.key)}
                style={{padding:"6px 2px",borderRadius:10,border:`1px solid ${status===s.key?s.color:"#FFE0C8"}`,background:status===s.key?s.bg:"transparent", color:status===s.key?s.color:"#94A3B8",cursor:"pointer",fontSize:10,fontWeight:700}}>
                {s.label}
              </button>
            ))}
          </div>
        </div>

        {/* 期間 + デフォルト時間数 */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
          <div>
            <label style={{fontSize:11, color: "#64748B",fontWeight:700,display:"block",marginBottom:5}}>開始月</label>
            <select value={startMonth} onChange={e=>setStartMonth(e.target.value)} style={{...IS2}}>
              {MONTHS.map(m=><option key={m} value={m}>{formatMonth(m)}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:11, color: "#64748B",fontWeight:700,display:"block",marginBottom:5}}>終了月</label>
            <select value={endMonth} onChange={e=>setEndMonth(e.target.value)} style={{...IS2}}>
              {MONTHS.map(m=><option key={m} value={m}>{formatMonth(m)}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:11, color: "#64748B",fontWeight:700,display:"block",marginBottom:5}}>各月のh数</label>
            <input type="number" placeholder="40" value={defaultHours}
              onChange={e=>{setDefaultHours(e.target.value);setMonthHours({});}} style={{...IS2}}/>
          </div>
        </div>

        {/* 月ごと調整 */}
        {spanMonths.length>0 && (
          <div style={{background:"#FCF5EF",borderRadius:10,padding:"12px 14px",marginBottom:12}}>
            <div style={{fontSize:10, color: "#94A3B8",fontWeight:700,marginBottom:8,display:"flex",justifyContent:"space-between"}}>
              <span>{isMultiMonth?"月ごとに調整（任意）":"時間数"}</span>
              <span style={{color:"#0077FF"}}>合計 {totalSpanHours}h · {spanMonths.length}ヶ月</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {spanMonths.map(mo=>(
                <div key={mo} style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:12, color: "#94A3B8",width:44,flexShrink:0}}>{mo.split("-")[1]}月</span>
                  {isMultiMonth&&(
                    <div style={{flex:1,height:4,background:"#FFD9C0",borderRadius:2,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${Math.min(100,(+(getHoursForMonth(mo))||0)/Math.max(1,+(defaultHours)||40)*100)}%`,background:"linear-gradient(90deg,#4ECDC4,#6EE7E0)",borderRadius:2,transition:"width 0.2s"}}/>
                    </div>
                  )}
                  <input type="number" value={getHoursForMonth(mo)} onChange={e=>setMonthHours(p=>({...p,[mo]:e.target.value}))}
                    style={{...IS2,width:60,textAlign:"center",padding:"5px 6px",fontSize:12}}/>
                  <span style={{fontSize:11, color: "#94A3B8",flexShrink:0,width:8}}>h</span>
                </div>
              ))}
            </div>
          </div>
        )}
        {MONTHS.indexOf(endMonth)<MONTHS.indexOf(startMonth)&&(
          <div style={{fontSize:12,color:"#FF6B6B",padding:"4px 0 10px",display:"flex",alignItems:"center",gap:4}}><Icon name="warning" size={11} color="currentColor"/> 終了月は開始月以降にしてください</div>
        )}

        {/* カラー */}
        <div style={{marginBottom:16}}>
          <div style={{display:"flex",gap:7}}>
          </div>
        </div>

        {/* サマリー */}
        {spanMonths.length>0&&(
          <div style={{marginBottom:14,padding:"10px 14px",background:"rgba(0,119,255,0.07)",border:"1px solid rgba(0,119,255,0.2)",borderRadius:10}}>
            <div style={{fontSize:11, color: "#0077FF",fontWeight:700}}>{spanMonths.length}ヶ月分 · 合計 {totalSpanHours}h のアサインを追加</div>
            <div style={{fontSize:10, color: "#64748B",marginTop:3}}>{spanMonths.map(mo=>`${mo.split("-")[1]}月 ${getHoursForMonth(mo)}h`).join(" → ")}</div>
          </div>
        )}

        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:11,borderRadius:10,border:"1px solid #FFE0C8",background:"transparent", color: "#777",cursor:"pointer",fontSize:13}}>キャンセル</button>
          <button onClick={handleSubmit} style={{flex:2,padding:11,borderRadius:10,border:"none",background:"#0077FF", color: "#FFFFFF",cursor:"pointer",fontSize:13,fontWeight:700}}>
            {isMultiMonth?`${spanMonths.length}ヶ月分を追加`:"追加する"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── メンバー編集フォーム ──────────────────────────────────
function MemberEditForm({ initialData, onSave, onCancel, isAdmin=true }) {
  const [data, setData] = useState({
    ...initialData,
    skills: Array.isArray(initialData.skills) ? initialData.skills.join(", ") : initialData.skills,
    projectFitOverride: Array.isArray(initialData.projectFitOverride) ? initialData.projectFitOverride.join(", ") : (initialData.projectFitOverride || ""),
  });
  const IS2 = { width:"100%", padding:"10px 13px", borderRadius:10, border:"1px solid #FFE0C8", background:"#FFF8F4", color:"#1E293B", fontSize:13, outline:"none", boxSizing:"border-box" };
  const IS2locked = { ...IS2, opacity:0.45, cursor:"not-allowed" };

  // スキルベースの自動生成プレビュー
  const skillsArray = typeof data.skills==="string" ? data.skills.split(",").map(s=>s.trim()).filter(Boolean) : data.skills;
  const autoFit = getProjectFit({...initialData, skills: skillsArray, projectFitOverride:[]});

  function handleFileUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setData(p => ({...p, imageUrl: ev.target.result}));
    reader.readAsDataURL(file);
  }

  function handleSave() {
    const skills = typeof data.skills==="string" ? data.skills.split(",").map(s=>s.trim()).filter(Boolean) : data.skills;
    const overrideRaw = typeof data.projectFitOverride==="string" ? data.projectFitOverride : data.projectFitOverride.join(", ");
    const projectFitOverride = overrideRaw.split(",").map(s=>s.trim()).filter(Boolean);
    onSave({...data, skills, projectFitOverride, maxHours:+data.maxHours, hourlyRate:+data.hourlyRate});
  }

  return (
    <div>
      {[{label:"氏名",key:"name",adminOnly:true},{label:"役割",key:"role",adminOnly:true},{label:"スキル (カンマ区切り)",key:"skills",adminOnly:false}].map(f=>(
        <Field key={f.key} label={f.label}>
          <input value={data[f.key]}
            disabled={f.adminOnly && !isAdmin}
            onChange={e=>{ if(!f.adminOnly||isAdmin) setData(p=>({...p,[f.key]:e.target.value})); }}
            style={f.adminOnly && !isAdmin ? IS2locked : IS2}/>
        </Field>
      ))}

      {/* アイコン画像 */}
      <div style={{marginBottom:14}}>
        <label style={{fontSize:11,color:"#64748B",fontWeight:700,display:"block",marginBottom:8}}>アイコン画像</label>
        <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
          {/* プレビュー */}
          <div style={{width:64,height:64,borderRadius:14,background:data.imageUrl?"transparent":initialData.color||"#94A3B8",flexShrink:0,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid #FFE0C8"}}>
            {data.imageUrl
              ? <img src={data.imageUrl} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.currentTarget.style.display="none"}}/>
              : <PersonIcon size={34}/>
            }
          </div>
          <div style={{flex:1,display:"flex",flexDirection:"column",gap:6}}>
            {/* ファイル選択 */}
            <input type="file" accept="image/*" id="avatar-file-input" style={{display:"none"}} onChange={handleFileUpload}/>
            <label htmlFor="avatar-file-input" style={{display:"inline-flex",alignItems:"center",gap:6,padding:"7px 12px",borderRadius:8,border:"1px solid #FFE0C8",background:"#FFF8F4",cursor:"pointer",fontSize:12,fontWeight:600,color:"#64748B",userSelect:"none"}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              デスクトップから選択
            </label>
            {/* URL入力 */}
            <input value={data.imageUrl&&data.imageUrl.startsWith("data:")?"":data.imageUrl||""} onChange={e=>setData(p=>({...p,imageUrl:e.target.value}))} placeholder="または画像URLを入力" style={{...IS2,fontSize:11}}/>
            {data.imageUrl&&<button onClick={()=>setData(p=>({...p,imageUrl:""}))} style={{alignSelf:"flex-start",fontSize:10,color:"#FF6B6B",background:"none",border:"none",cursor:"pointer",padding:0}}>× 画像を削除</button>}
          </div>
        </div>
      </div>

      {/* Notion プロフィールURL */}
      <div style={{marginBottom:14}}>
        <label style={{fontSize:11,color:"#64748B",fontWeight:700,display:"block",marginBottom:5}}>Notion プロフィール URL</label>
        <input value={data.notionUrl||""} onChange={e=>setData(p=>({...p,notionUrl:e.target.value}))} placeholder="https://notion.so/..." style={IS2}/>
      </div>

      {/* ベーススコア */}

      {/* 得意な案件タイプ */}
      <div style={{marginBottom:14}}>
        <label style={{fontSize:11, color: "#64748B",fontWeight:700,display:"block",marginBottom:5}}>
          得意な案件タイプ（手動上書き）
        </label>
        <input
          value={data.projectFitOverride}
          onChange={e=>setData(p=>({...p,projectFitOverride:e.target.value}))}
          placeholder="空白にするとスキルから自動生成"
          style={IS2}
        />
        {autoFit.length > 0 && (
          <div style={{marginTop:6,display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:10, color: "#94A3B8",flexShrink:0}}>自動生成:</span>
            {autoFit.map(f=>(
              <button key={f} onClick={()=>setData(p=>{
                const cur = p.projectFitOverride ? p.projectFitOverride.split(",").map(s=>s.trim()).filter(Boolean) : [];
                if (cur.includes(f)) return p;
                return {...p, projectFitOverride:[...cur,f].join(", ")};
              })} style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:"rgba(78,205,196,0.08)", color: "#4ECDC4",border:"1px solid rgba(78,205,196,0.2)",cursor:"pointer",fontWeight:600}}>
                + {f}
              </button>
            ))}
          </div>
        )}
        {data.projectFitOverride && (
          <button onClick={()=>setData(p=>({...p,projectFitOverride:""}))}
            style={{marginTop:5,fontSize:10, color: "#94A3B8",background:"none",border:"none",cursor:"pointer",padding:0}}>
            ✕ 上書きをクリアして自動生成に戻す
          </button>
        )}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="最大稼働時間/月">
          <input type="number" value={data.maxHours}
            disabled={!isAdmin}
            onChange={e=>{ if(isAdmin) setData(p=>({...p,maxHours:e.target.value})); }}
            style={!isAdmin ? IS2locked : IS2}/>
        </Field>
        <Field label="時給 (¥)">
          <input type="number" value={data.hourlyRate}
            disabled={!isAdmin}
            onChange={e=>{ if(isAdmin) setData(p=>({...p,hourlyRate:e.target.value})); }}
            style={!isAdmin ? IS2locked : IS2}/>
        </Field>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="契約形態">
          <select value={data.contractType}
            disabled={!isAdmin}
            onChange={e=>{ if(isAdmin) setData(p=>({...p,contractType:e.target.value})); }}
            style={!isAdmin ? IS2locked : IS2}>
            {CONTRACT_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
        </Field>
        <Field label="ランク">
          <select value={data.rank}
            disabled={!isAdmin}
            onChange={e=>{ if(isAdmin) setData(p=>({...p,rank:e.target.value})); }}
            style={!isAdmin ? IS2locked : IS2}>
            {RANKS.map(r=><option key={r} value={r}>{r}</option>)}
          </select>
        </Field>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="性別">
          <div style={{display:"flex",gap:6}}>
            {["female","male"].map(g=>(
              <button key={g} onClick={()=>setData(p=>({...p,gender:g}))} style={{flex:1,padding:"9px",borderRadius:10,border:"1px solid",cursor:"pointer",fontSize:12,fontWeight:600,borderColor:data.gender===g?"#0077FF":"#FFE0C8",background:data.gender===g?"rgba(0,119,255,0.12)":"transparent", color:data.gender===g?"#0077FF":"#777"}}>
                {g==="female"?"女性":"男性"}
              </button>
            ))}
          </div>
        </Field>
        <Field label="提案稼働">
          <div style={{display:"flex",gap:6}}>
            {[true,false].map(v=>(
              <button key={String(v)} onClick={()=>setData(p=>({...p,canPropose:v}))} style={{flex:1,padding:"9px",borderRadius:10,border:"1px solid",cursor:"pointer",fontSize:12,fontWeight:600,borderColor:data.canPropose===v?"#4ECDC4":"#FFE0C8",background:data.canPropose===v?"rgba(78,205,196,0.1)":"transparent", color:data.canPropose===v?"#4ECDC4":"#777"}}>
                {v?"可":"不可"}
              </button>
            ))}
          </div>
        </Field>
      </div>
      <div style={{display:"flex",gap:8,marginTop:8}}>
        <button onClick={onCancel} style={{flex:1,padding:11,borderRadius:10,border:"1px solid #FFE0C8",background:"transparent", color: "#777",cursor:"pointer",fontSize:13}}>キャンセル</button>
        <button onClick={handleSave} style={{flex:1,padding:11,borderRadius:10,border:"none",background:"#0077FF", color: "#FFFFFF",cursor:"pointer",fontSize:13,fontWeight:700}}>保存する</button>
      </div>
    </div>
  );
}
